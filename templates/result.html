<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Report | PrashantDevelops</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <style>
        #vanta-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans relative pb-16">

    <div id="vanta-canvas"></div>

    <nav class="border-b border-gray-800/60 bg-gray-950/70 backdrop-blur-md px-8 py-4 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🛡️</span>
            <span class="font-bold text-xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">PrashantDevelops</span>
        </div>
        <a href="/" class="text-xs bg-gray-800/80 hover:bg-gray-700 border border-gray-700 px-4 py-2 rounded-lg transition tracking-wider font-mono uppercase">
            ← Scan New Image
        </a>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-4 relative z-10">
        
        <div class="mb-10 p-6 rounded-2xl border text-center backdrop-blur-xl {% if prediction == 1 %} bg-red-950/40 border-red-500/40 text-red-200 shadow-lg shadow-red-950/20 {% else %} bg-emerald-950/40 border-emerald-500/40 text-emerald-200 shadow-lg shadow-emerald-900/10 {% endif %}">
            <span class="text-4xl block mb-2">{% if prediction == 1 %}🚩 WARNING{% else %}✅ VERIFIED AUTHENTIC{% endif %}</span>
            <h2 class="text-2xl font-extrabold tracking-wide uppercase">{{ result }}</h2>
            <p class="text-sm text-gray-400 mt-1 font-mono">SVM Kernel Confidence: {{ confidence }}%</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-900/60 border border-gray-800/80 rounded-xl p-5 flex flex-col items-center backdrop-blur-xl">
                <h4 class="text-sm font-semibold tracking-widest text-gray-400 mb-4 uppercase font-mono">[01] Input Matrix</h4>
                <div class="w-full flex-grow flex items-center justify-center bg-black/40 rounded-lg overflow-hidden border border-gray-800 p-2">
                    <img src="{{ url_for('static', filename='plots/input.png') }}" class="max-h-64 object-contain rounded">
                </div>
            </div>

            <div class="bg-gray-900/60 border border-gray-800/80 rounded-xl p-5 flex flex-col items-center backdrop-blur-xl">
                <h4 class="text-sm font-semibold tracking-widest text-gray-400 mb-4 uppercase font-mono">[02] 2D Fourier Power Spectrum</h4>
                <div class="w-full flex-grow flex items-center justify-center bg-black/40 rounded-lg overflow-hidden border border-gray-800 p-2">
                    <img src="{{ url_for('static', filename='plots/fft.png') }}" class="max-h-64 object-contain rounded">
                </div>
            </div>

            <div class="bg-gray-900/60 border border-gray-800/80 rounded-xl p-5 flex flex-col items-center backdrop-blur-xl">
                <h4 class="text-sm font-semibold tracking-widest text-gray-400 mb-4 uppercase font-mono">[03] 1D Radial Profile Plot</h4>
                <div class="w-full flex-grow flex items-center justify-center bg-black/40 rounded-lg overflow-hidden border border-gray-800 p-2">
                    <img src="{{ url_for('static', filename='plots/graph.png') }}" class="max-h-64 object-contain rounded">
                </div>
            </div>
        </div>
    </main>

    <footer class="absolute bottom-4 right-6 text-xs text-gray-600 font-mono tracking-widest uppercase z-10">
        Developed by <span class="text-emerald-500/80 font-bold hover:text-cyan-400 transition duration-200">PrashantDevelops</span>
    </footer>

    <script>
        VANTA.NET({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x10b981,
            backgroundColor: 0x070a13,
            points: 11.00,
            maxDistance: 21.00,
            spacing: 16.00
        });
    </script>
</body>
</html>
